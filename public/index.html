<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OK 일러스트 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #FF5C00;
    --orange-light: #FF7A2E;
    --dark: #111111;
    --gray: #1A1A1A;
    --gray-2: #2A2A2A;
    --gray-3: #888888;
    --white: #FFFFFF;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  .header { text-align: center; margin-bottom: 48px; }

  .badge {
    display: inline-block;
    background: var(--orange);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
  h1 span { color: var(--orange); }
  .subtitle { color: var(--gray-3); font-size: 15px; font-weight: 300; }

  .card {
    background: var(--gray);
    border: 1px solid var(--gray-2);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gray-3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--gray-2);
    border-radius: 12px;
    padding: 16px;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 300;
    resize: none;
    outline: none;
    height: 100px;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--orange); }
  textarea::placeholder { color: var(--gray-3); }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

  .example-tag {
    background: var(--gray-2);
    border: 1px solid #333;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--gray-3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .example-tag:hover { background: var(--orange); border-color: var(--orange); color: white; }

  .generate-btn {
    width: 100%;
    background: var(--orange);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover { background: var(--orange-light); transform: translateY(-1px); }
  .generate-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

  .result-area { width: 100%; max-width: 560px; display: none; }
  .result-area.visible { display: block; }

  .result-card {
    background: var(--gray);
    border: 1px solid var(--gray-2);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
  }

  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
  .loading.visible { display: flex; }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--gray-2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-prompt {
    color: var(--white);
    font-size: 13px;
    background: var(--gray-2);
    padding: 8px 16px;
    border-radius: 8px;
    font-style: italic;
  }

  .result-image-wrap { display: none; flex-direction: column; align-items: center; gap: 20px; }
  .result-image-wrap.visible { display: flex; }

  .result-image {
    max-width: 100%;
    max-height: 400px;
    border-radius: 12px;
    background: repeating-conic-gradient(#333 0% 25%, #2A2A2A 0% 50%) 0 0 / 20px 20px;
  }

  .translated-prompt {
    background: var(--dark);
    border: 1px solid var(--gray-2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--gray-3);
    text-align: left;
    width: 100%;
    line-height: 1.6;
  }

  .translated-prompt strong {
    color: var(--orange);
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .download-btn {
    background: var(--gray-2);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 24px;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .download-btn:hover { background: #333; }

  .error-msg {
    display: none;
    background: #2A1010;
    border: 1px solid #5A2020;
    border-radius: 10px;
    padding: 14px 16px;
    color: #FF6B6B;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 16px;
  }

  .error-msg.visible { display: block; }

  .step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .step-text { font-size: 13px; color: var(--gray-3); }
</style>
</head>
<body>

<div class="header">
  <div class="badge">AI Illustration Generator</div>
  <h1>원하는 일러스트를<br><span>자연어로</span> 만들어보세요</h1>
  <p class="subtitle">한국어로 입력하면 3D 클레이 스타일 일러스트로 생성돼요</p>
</div>

<div class="card">
  <div class="section-label">어떤 일러스트가 필요하세요?</div>
  <textarea id="userInput" placeholder="예: 통장 위에 동전이 쌓여있는&#10;예: 서류를 돋보기로 확인하는&#10;예: 열쇠가 자물쇠에 꽂혀있는"></textarea>

  <div class="examples">
    <span class="example-tag" onclick="setExample('저금통에 동전이 들어가는')">저금통에 동전이 들어가는</span>
    <span class="example-tag" onclick="setExample('카드로 결제하는')">카드로 결제하는</span>
    <span class="example-tag" onclick="setExample('서류를 검토하는')">서류를 검토하는</span>
    <span class="example-tag" onclick="setExample('달력에 일정을 표시하는')">달력에 일정을 표시하는</span>
    <span class="example-tag" onclick="setExample('폴더에 문서가 쌓여있는')">폴더에 문서가 쌓여있는</span>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">
    ✦ 일러스트 생성하기
  </button>

  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="result-area" id="resultArea">
  <div class="result-card">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>
        <div class="step-indicator" id="step1">
          <div class="step-dot"></div>
          <span class="step-text">프롬프트 변환 중...</span>
        </div>
        <div class="step-indicator" id="step2" style="display:none">
          <div class="step-dot"></div>
          <span class="step-text">AI가 일러스트 생성 중... (10~30초 소요)</span>
        </div>
      </div>
      <div class="loading-prompt" id="loadingPrompt"></div>
    </div>

    <div class="result-image-wrap" id="resultImageWrap">
      <img class="result-image" id="resultImage" alt="생성된 일러스트">
      <div class="translated-prompt">
        <strong>사용된 프롬프트</strong>
        <span id="promptText"></span>
      </div>
      <a class="download-btn" id="downloadBtn" download="illust.png">⬇ 이미지 다운로드</a>
    </div>
  </div>
</div>

<script>
function setExample(text) {
  document.getElementById('userInput').value = text;
}

function translateToPrompt(koreanText) {
  const map = {
    '저금통': 'piggy bank', '동전': 'gold coins', '통장': 'bankbook',
    '카드': 'credit card', '결제': 'payment', '서류': 'document',
    '달력': 'calendar', '캘린더': 'calendar', '일정': 'schedule',
    '폴더': 'folder', '문서': 'documents', '돋보기': 'magnifying glass',
    '자물쇠': 'padlock', '열쇠': 'key', '지갑': 'wallet',
    '코인': 'coins', '돈': 'money', '검토': 'reviewing',
    '쌓여있는': 'stacked', '들어가는': 'falling into', '표시하는': 'marked',
    '확인하는': 'inspecting', '꽂혀있는': 'inserted into',
  };

  let englishText = koreanText;
  Object.entries(map).forEach(([ko, en]) => {
    englishText = englishText.replace(new RegExp(ko, 'g'), en);
  });

  return `okicon style, 3D clay icon, ${englishText}, inflated plastic texture, soft shadow, isometric angle, transparent background, Korean fintech app icon style, vibrant colors`;
}

async function generate() {
  const userInput = document.getElementById('userInput').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('visible');

  if (!userInput) {
    errorMsg.textContent = '원하는 일러스트를 입력해주세요.';
    errorMsg.classList.add('visible');
    return;
  }

  const prompt = translateToPrompt(userInput);

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultArea').classList.add('visible');
  document.getElementById('loading').classList.add('visible');
  document.getElementById('resultImageWrap').classList.remove('visible');
  document.getElementById('loadingPrompt').textContent = `"${userInput}"`;
  document.getElementById('step1').style.display = 'flex';
  document.getElementById('step2').style.display = 'none';

  try {
    await new Promise(r => setTimeout(r, 800));
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'flex';

    // API Key 없이 서버에 요청 (서버에서 환경변수로 처리)
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '알 수 없는 오류');

    document.getElementById('resultImage').src = data.imageUrl;
    document.getElementById('promptText').textContent = prompt;
    document.getElementById('downloadBtn').href = data.imageUrl;
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('resultImageWrap').classList.add('visible');

  } catch (err) {
    document.getElementById('loading').classList.remove('visible');
    errorMsg.textContent = `오류: ${err.message}`;
    errorMsg.classList.add('visible');
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.metaKey) generate();
});
</script>
</body>
</html>
