<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OK 일러스트 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --orange: #FF5C00; --dark: #111; --gray: #1A1A1A; --gray-2: #2A2A2A; --gray-3: #888; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
  .badge { display: inline-block; background: var(--orange); color: white; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; text-transform: uppercase; }
  h1 { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; text-align: center; }
  h1 span { color: var(--orange); }
  .subtitle { color: var(--gray-3); font-size: 15px; font-weight: 300; margin-bottom: 48px; }
  .card { background: var(--gray); border: 1px solid var(--gray-2); border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; margin-bottom: 24px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--gray-3); text-transform: uppercase; margin-bottom: 12px; }
  textarea { width: 100%; background: var(--dark); border: 1px solid var(--gray-2); border-radius: 12px; padding: 16px; color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; resize: none; outline: none; height: 100px; transition: border-color 0.2s; line-height: 1.6; }
  textarea:focus { border-color: var(--orange); }
  textarea::placeholder { color: var(--gray-3); }
  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .example-tag { background: var(--gray-2); border: 1px solid #333; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--gray-3); cursor: pointer; transition: all 0.2s; }
  .example-tag:hover { background: var(--orange); border-color: var(--orange); color: white; }
  .generate-btn { width: 100%; background: var(--orange); border: none; border-radius: 12px; padding: 16px; color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
  .generate-btn:hover { background: #FF7A2E; transform: translateY(-1px); }
  .generate-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
  .result-area { width: 100%; max-width: 560px; display: none; }
  .result-area.visible { display: block; }
  .result-card { background: var(--gray); border: 1px solid var(--gray-2); border-radius: 20px; padding: 32px; text-align: center; }
  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
  .loading.visible { display: flex; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--gray-2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-prompt { color: #fff; font-size: 13px; background: var(--gray-2); padding: 8px 16px; border-radius: 8px; font-style: italic; }
  .result-image-wrap { display: none; flex-direction: column; align-items: center; gap: 20px; }
  .result-image-wrap.visible { display: flex; }
  .result-image { max-width: 100%; max-height: 400px; border-radius: 12px; }
  .prompt-box { background: var(--dark); border: 1px solid var(--gray-2); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: var(--gray-3); text-align: left; width: 100%; line-height: 1.6; }
  .prompt-box strong { color: var(--orange); display: block; margin-bottom: 4px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .download-btn { background: var(--gray-2); border: 1px solid #333; border-radius: 10px; padding: 12px 24px; color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
  .download-btn:hover { background: #333; }
  .error-msg { display: none; background: #2A1010; border: 1px solid #5A2020; border-radius: 10px; padding: 14px 16px; color: #FF6B6B; font-size: 13px; margin-top: 16px; word-break: break-all; }
  .error-msg.visible { display: block; }
  .step { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .step-text { font-size: 13px; color: var(--gray-3); }
</style>
</head>
<body>
<div class="badge">AI Illustration Generator</div>
<h1>원하는 일러스트를<br><span>자연어로</span> 만들어보세요</h1>
<p class="subtitle">한국어로 입력하면 3D 클레이 스타일 일러스트로 생성돼요</p>

<div class="card">
  <div class="section-label">어떤 일러스트가 필요하세요?</div>
  <textarea id="userInput" placeholder="예: 통장 위에 동전이 쌓여있는&#10;예: 서류를 돋보기로 확인하는&#10;예: 열쇠가 자물쇠에 꽂혀있는"></textarea>
  <div class="examples">
    <span class="example-tag" onclick="setExample('저금통에 동전이 들어가는')">저금통에 동전이 들어가는</span>
    <span class="example-tag" onclick="setExample('카드로 결제하는')">카드로 결제하는</span>
    <span class="example-tag" onclick="setExample('서류를 검토하는')">서류를 검토하는</span>
    <span class="example-tag" onclick="setExample('달력에 일정을 표시하는')">달력에 일정을 표시하는</span>
    <span class="example-tag" onclick="setExample('폴더에 문서가 쌓여있는')">폴더에 문서가 쌓여있는</span>
  </div>
  <button class="generate-btn" id="generateBtn" onclick="generate()">✦ 일러스트 생성하기</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="result-area" id="resultArea">
  <div class="result-card">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>
        <div class="step" id="step1"><div class="dot"></div><span class="step-text">생성 요청 중...</span></div>
        <div class="step" id="step2" style="display:none"><div class="dot"></div><span class="step-text">AI가 일러스트 생성 중... (10~30초 소요)</span></div>
      </div>
      <div class="loading-prompt" id="loadingPrompt"></div>
    </div>
    <div class="result-image-wrap" id="resultImageWrap">
      <img class="result-image" id="resultImage" alt="생성된 일러스트">
      <div class="prompt-box"><strong>사용된 프롬프트</strong><span id="promptText"></span></div>
      <a class="download-btn" id="downloadBtn" download="illust.png">⬇ 이미지 다운로드</a>
    </div>
  </div>
</div>

<script>
function setExample(t) { document.getElementById('userInput').value = t; }

function translateToPrompt(t) {
  const map = {
    '저금통':'piggy bank','동전':'gold coins','통장':'bankbook','카드':'credit card',
    '결제':'payment','서류':'document','달력':'calendar','캘린더':'calendar',
    '일정':'schedule','폴더':'folder','문서':'documents','돋보기':'magnifying glass',
    '자물쇠':'padlock','열쇠':'key','지갑':'wallet','코인':'coins','돈':'money',
    '검토':'reviewing','쌓여있는':'stacked','들어가는':'falling into',
    '표시하는':'marked','확인하는':'inspecting','꽂혀있는':'inserted into',
  };
  let e = t;
  Object.entries(map).forEach(([k,v]) => { e = e.replace(new RegExp(k,'g'), v); });
  return 'okicon style, 3D icon, ' + e + ', inflated plastic texture, soft shadow, isometric angle, transparent background, Korean fintech app icon style, vibrant colors';
}

// Scenario 응답에서 이미지 URL 찾기
function findImageUrl(data) {
  return data?.job?.images?.[0]?.url
    || data?.images?.[0]?.url
    || data?.output?.[0]
    || data?.image
    || null;
}

// Scenario 응답에서 Job ID 찾기
function findJobId(data) {
  return data?.job?.jobId    // ← 실제 응답 구조
    || data?.jobId
    || data?.id
    || data?.inferenceId
    || null;
}

// Scenario 응답에서 상태 찾기
function findStatus(data) {
  return data?.job?.status
    || data?.status
    || null;
}

async function pollJob(jobId, prompt) {
// 수정 (60번 × 5초 = 300초 = 5분)
for (let i = 0; i < 60; i++) {
  await new Promise(r => setTimeout(r, 5000));

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobId }),
    });

    const data = await res.json();
    const status = findStatus(data);
    const imageUrl = findImageUrl(data);

    console.log(`폴링 ${i+1}번째, status: ${status}`, data);

    if (imageUrl) return imageUrl;
    if (status === 'failed') throw new Error('이미지 생성에 실패했어요');
  }
  throw new Error('5분이 초과됐어요. 다시 시도해주세요.');
}

async function generate() {
  const input = document.getElementById('userInput').value.trim();
  const err = document.getElementById('errorMsg');
  err.classList.remove('visible');
  if (!input) { err.textContent = '원하는 일러스트를 입력해주세요.'; err.classList.add('visible'); return; }

  const prompt = translateToPrompt(input);
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultArea').classList.add('visible');
  document.getElementById('loading').classList.add('visible');
  document.getElementById('resultImageWrap').classList.remove('visible');
  document.getElementById('loadingPrompt').textContent = '"' + input + '"';
  document.getElementById('step1').style.display = 'flex';
  document.getElementById('step2').style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || JSON.stringify(data));

    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'flex';

    // 즉시 이미지 URL 있으면 바로 표시
    const immediateUrl = findImageUrl(data);
    if (immediateUrl) { showResult(immediateUrl, prompt); return; }

    // Job ID로 폴링
    const jobId = findJobId(data);
    if (!jobId) throw new Error('Job ID를 받지 못했어요: ' + JSON.stringify(data));

    const imageUrl = await pollJob(jobId, prompt);
    showResult(imageUrl, prompt);

  } catch(e) {
    document.getElementById('loading').classList.remove('visible');
    err.textContent = '오류: ' + e.message;
    err.classList.add('visible');
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

function showResult(imageUrl, prompt) {
  document.getElementById('resultImage').src = imageUrl;
  document.getElementById('promptText').textContent = prompt;
  document.getElementById('downloadBtn').href = imageUrl;
  document.getElementById('loading').classList.remove('visible');
  document.getElementById('resultImageWrap').classList.add('visible');
}
</script>
</body>
</html>
